appId: com.decibell.app
productName: Decibell
copyright: Copyright © 2026 Decibell
directories:
  output: release
  buildResources: resources

# Update metadata target. Without a publish block configured,
# electron-builder skips generating the latest.yml / latest-linux.yml
# / *.blockmap files that electron-updater needs to discover newer
# versions. The CI still uploads artifacts via softprops/action-gh-
# release (clearer semantics; single source of truth for what lands
# on the release page), so we keep --publish=never on the package
# step. This block exists purely to coerce electron-builder into
# emitting the metadata files into release/ as part of the build.
publish:
  provider: github
  owner: sunkhan
  repo: decibell

# We use the Castlabs Widevine-enabled Electron fork
# (github:castlabs/electron-releases#v33.4.11+wvcus in package.json),
# which publishes its release zips to github.com/castlabs/electron-
# releases — not the upstream github.com/electron/electron.
# Without this mirror override, electron-builder constructs the
# default upstream URL and 404s on the Castlabs version tag.
electronDownload:
  mirror: https://github.com/castlabs/electron-releases/releases/download/v

files:
  - dist/**/*
  - native/index.js
  - native/index.d.ts
  # napi-rs writes the binary as `index.{platform}-{arch}-{libc}.node`
  # (Linux: index.linux-x64-gnu.node, Windows: index.win32-x64-msvc.node,
  # macOS: index.darwin-x64.node, etc.). The earlier glob
  # `native/decibell.*.node` matched nothing — the package shipped
  # without the addon and crashed on first launch.
  - native/index.*.node
  # Windows: FFmpeg DLLs that the native addon dynamic-links against
  # (avcodec / avutil / avformat / swresample / swscale). copy-dlls.cjs
  # places them in native/ during the build; this glob ships them in
  # the same dir as the .node file so Windows' DLL search order finds
  # them automatically with no PATH manipulation at runtime.
  - native/*.dll
  - package.json

asarUnpack:
  - native/**/*.node
  - native/index.js
  # DLLs must live outside the asar archive so Windows' loader can
  # mmap them — DLLs inside an asar are inaccessible to LoadLibrary.
  - native/*.dll

# Ship the app icon as a runtime resource (loaded by BrowserWindow's
# `icon:` option for the OS taskbar / Alt-Tab icon). buildResources/
# is for installer chrome only; runtime needs the file under
# process.resourcesPath.
extraResources:
  - from: resources/icon.png
    to: icon.png

linux:
  # Without this, electron-builder names the binary after package.json's
  # `name` field — `decibell-electron-client` — and bakes that path
  # into /opt/Decibell/<bin> *and* the generated .desktop's Exec line.
  # Pin the on-disk name to the user-facing one.
  executableName: decibell
  target:
    - AppImage
    - deb
    - pacman
  category: Network
  artifactName: ${productName}-${version}-${arch}.${ext}

# electron-builder's pacman target (built via fpm) inherits the deb
# dependency list by default, which contains Debian package names like
# `http-parser`, `re2`, `snappy` that don't exist in Arch's repos and
# would block `pacman -U` of the bare .pacman. Override with the real
# Arch package set so a direct install (no AUR helper) also works.
# (The AUR PKGBUILD sets its own depends and ignores this — but users
# who download the .pacman from Releases get a working install too.)
pacman:
  depends:
    - gtk3
    - nss
    - alsa-lib
    - libxss
    - libnotify
    - libsecret
    - pipewire
    - libpipewire

win:
  target: nsis
  artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  target:
    - dmg
  artifactName: ${productName}-${version}-${arch}.${ext}
