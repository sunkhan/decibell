name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: linux
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-client/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-client/package-lock.json

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"

      - name: Install Linux system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libopus-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            libasound2-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Windows system dependencies
        if: matrix.target == 'windows'
        run: |
          vcpkg install ffmpeg[nvcodec,amf,qsv]:x64-windows opus:x64-windows
          choco install pkgconfiglite -y
          $installed = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "FFMPEG_DIR=$installed" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$installed\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "$installed\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Bundle FFmpeg DLLs for Windows
        if: matrix.target == 'windows'
        run: |
          $installed = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          $resDir = "tauri-client\src-tauri\ffmpeg-dlls"
          New-Item -ItemType Directory -Force -Path $resDir
          Copy-Item "$installed\bin\avutil*.dll" $resDir
          Copy-Item "$installed\bin\avcodec*.dll" $resDir
          Copy-Item "$installed\bin\avformat*.dll" $resDir
          Copy-Item "$installed\bin\avdevice*.dll" $resDir
          Copy-Item "$installed\bin\avfilter*.dll" $resDir
          Copy-Item "$installed\bin\swresample*.dll" $resDir
          Copy-Item "$installed\bin\swscale*.dll" $resDir
          Get-ChildItem $resDir
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: tauri-client
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri-client
          tagName: ${{ github.ref_name }}
          releaseName: "Decibell ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
