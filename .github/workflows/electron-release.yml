name: Electron Release

# Tag-driven cross-platform packaging for the electron-client.
# Trigger:    git tag v0.x.y && git push --tags
# Artifacts:  AppImage + .deb (Linux), .exe (Windows NSIS),
#             .dmg (macOS) — all attached to a GitHub Release named
#             after the tag. Native binaries are built per-platform
#             on the corresponding runner so the napi-rs `.node` is
#             always native (no cross-compilation, no Wine).

on:
  push:
    tags:
      - "ev*"  # decoupled from tauri-client's `v*` tag namespace

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target_label: linux
          - os: windows-latest
            target_label: windows
          - os: macos-14
            target_label: macos

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron-client

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: electron-client/native

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-client/package-lock.json

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          # Without a token the action queries the GitHub releases API
          # unauthenticated and gets rate-limited (most often on macOS
          # runners where the IP pool churns more).
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system deps
        if: matrix.target_label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libdbus-1-dev \
            libwayland-dev \
            libegl-dev \
            libgl-dev \
            libasound2-dev \
            libopus-dev \
            libclang-dev \
            pkg-config \
            fakeroot \
            libarchive-tools
        working-directory: .

      # Windows runners have MSVC, CMake, and the SDK pre-installed.
      # audiopus vendors libopus, cpal uses WASAPI from the windows
      # crate — no extra system deps needed.

      # FFmpeg comes from vcpkg on Windows (ffmpeg-next dynamic-linked,
      # see docs/superpowers/specs/2026-05-12-windows-native-ffmpeg-
      # encoder-design.md). vcpkg is pre-installed on the windows-latest
      # runner image; we just trigger the port build for our required
      # feature set and surface VCPKG_ROOT to the cargo build step.
      - name: Install FFmpeg via vcpkg (Windows)
        if: matrix.target_label == 'windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "ffmpeg[nvcodec,amf,qsv]:x64-windows"
        working-directory: .

      - name: Export VCPKG_ROOT (Windows)
        if: matrix.target_label == 'windows'
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: .

      - name: Install root npm deps
        run: npm ci

      # native/ has its own package.json (just @napi-rs/cli as a devDep)
      # and is not a workspace of the root, so the root `npm ci` doesn't
      # touch it. Without this, `napi build` is not on PATH and the next
      # step fails on every runner.
      - name: Install native npm deps
        run: npm ci
        working-directory: electron-client/native

      - name: Build native addon
        env:
          # audiopus_sys vendors a libopus copy whose CMakeLists has
          # cmake_minimum_required(VERSION 3.1) — CMake 4.x (default
          # on macos-14 and recent ubuntu runners) refuses to honor
          # policy versions older than 3.5. This shim re-enables the
          # legacy minimum globally.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: npm run build:native

      - name: Build renderer + main
        run: |
          npm run build:renderer
          npm run build:tsc

      - name: Package
        # Don't expose GH_TOKEN here. electron-builder treats its
        # presence as "implicit GitHub publish provider", then tries
        # to generate auto-update metadata (latest-*.yml) and crashes
        # on a null `channel` because we have no `repository` field
        # set. We don't need its publishing — the release job below
        # uploads via softprops/action-gh-release directly.
        run: npx electron-builder --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: decibell-${{ matrix.target_label }}
          path: |
            electron-client/release/*.AppImage
            electron-client/release/*.deb
            electron-client/release/*.pacman
            electron-client/release/*.exe
            electron-client/release/*.dmg
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Decibell ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*
