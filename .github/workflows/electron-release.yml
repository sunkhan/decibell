name: Electron Release

# Tag-driven cross-platform packaging for the electron-client.
# Trigger:    git tag v0.x.y && git push --tags
# Artifacts:  AppImage + .deb (Linux), .exe (Windows NSIS),
#             .dmg (macOS) — all attached to a GitHub Release named
#             after the tag. Native binaries are built per-platform
#             on the corresponding runner so the napi-rs `.node` is
#             always native (no cross-compilation, no Wine).

on:
  push:
    tags:
      - "ev*"  # decoupled from tauri-client's `v*` tag namespace

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target_label: linux
          - os: windows-latest
            target_label: windows
          - os: macos-14
            target_label: macos

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron-client

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: electron-client/native

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-client/package-lock.json

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          # Without a token the action queries the GitHub releases API
          # unauthenticated and gets rate-limited (most often on macOS
          # runners where the IP pool churns more).
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system deps
        if: matrix.target_label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libdbus-1-dev \
            libwayland-dev \
            libegl-dev \
            libgl-dev \
            libasound2-dev \
            libopus-dev \
            libclang-dev \
            pkg-config \
            fakeroot \
            libarchive-tools
        working-directory: .

      # Windows runners have MSVC, CMake, and the SDK pre-installed.
      # audiopus vendors libopus, cpal uses WASAPI from the windows
      # crate — no extra system deps needed.

      # FFmpeg comes from vcpkg on Windows (ffmpeg-next dynamic-linked,
      # see docs/superpowers/specs/2026-05-12-windows-native-ffmpeg-
      # encoder-design.md). vcpkg is pre-installed on the windows-latest
      # runner image; we pin it to the same commit the Tauri-era
      # release.yml pinned (b44ac73 / 0.4.9), then run install for our
      # feature set.
      #
      # Why pin: newer vcpkg FFmpeg 8 ports ship a d3d11va_frames_init
      # that fails to allocate the NV12 texture array. Symptom is
      # av_hwframe_ctx_init returning AVERROR_UNKNOWN (-1313558101) for
      # every BindFlags combo at stream start. The pinned commit
      # (e5a1490e1409d175932ef6014519e9ae149ddb7c) matches a known-good
      # FFmpeg port build that works end-to-end with NVENC. Re-pin only
      # when the local + CI FFmpeg state has been re-validated together.
      - name: Install FFmpeg via vcpkg (Windows)
        if: matrix.target_label == 'windows'
        shell: pwsh
        run: |
          git -C "$env:VCPKG_INSTALLATION_ROOT" fetch --quiet origin
          git -C "$env:VCPKG_INSTALLATION_ROOT" checkout e5a1490e1409d175932ef6014519e9ae149ddb7c
          & "$env:VCPKG_INSTALLATION_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "ffmpeg[nvcodec,amf,qsv]:x64-windows"
        working-directory: .

      - name: Export VCPKG_ROOT (Windows)
        if: matrix.target_label == 'windows'
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: .

      - name: Install root npm deps
        run: npm ci

      # native/ has its own package.json (just @napi-rs/cli as a devDep)
      # and is not a workspace of the root, so the root `npm ci` doesn't
      # touch it. Without this, `napi build` is not on PATH and the next
      # step fails on every runner.
      - name: Install native npm deps
        run: npm ci
        working-directory: electron-client/native

      - name: Build native addon
        env:
          # audiopus_sys vendors a libopus copy whose CMakeLists has
          # cmake_minimum_required(VERSION 3.1) — CMake 4.x (default
          # on macos-14 and recent ubuntu runners) refuses to honor
          # policy versions older than 3.5. This shim re-enables the
          # legacy minimum globally.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: npm run build:native

      # Pre-renders @twemoji/svg into src/components/emoji/twemoji-data.json,
      # which is gitignored but imported by RichInput. Without this the
      # vite build fails with "Could not resolve ../emoji/twemoji-data.json".
      # The bundled `npm run build` script chains it with the others, but
      # we invoke each step separately here to share the rust cache and
      # parallelize, so it has to run on its own.
      - name: Generate twemoji map
        run: npm run build:twemoji

      - name: Build renderer + main
        # Force bash on Windows too. PowerShell (the default on
        # windows-latest) doesn't fail-fast on multi-line scripts, so a
        # vite error here would silently fall through to `tsc` and the
        # step would exit 0 with a missing dist/ — masking a real break.
        shell: bash
        run: |
          npm run build:renderer
          npm run build:tsc

      - name: Bake Sentry DSN
        # The job's default working-directory is electron-client/ (set
        # in the top-level `defaults:` block) so all paths here are
        # relative to that. Prefixing them with `electron-client/`
        # would resolve to electron-client/electron-client/... and miss
        # the file entirely — which is the bug that bit 0.6.6 silently.
        if: env.SENTRY_DSN != ''
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        shell: bash
        run: |
          mkdir -p resources
          echo "{\"dsn\":\"$SENTRY_DSN\"}" > resources/sentry.json
          echo "[sentry] DSN written to electron-client/resources/sentry.json"

      - name: Package
        # Don't expose GH_TOKEN here. electron-builder treats its
        # presence as "implicit GitHub publish provider", then tries
        # to generate auto-update metadata (latest-*.yml) and crashes
        # on a null `channel` because we have no `repository` field
        # set. We don't need its publishing — the release job below
        # uploads via softprops/action-gh-release directly.
        run: npx electron-builder --publish=never

      - name: Upload source maps to Sentry
        # continue-on-error so a flaky upload never blocks the
        # binaries from shipping. The downside is just unreadable
        # stack traces for that one release; we caught this on 0.6.6
        # when the upload failed and cascaded into "Upload artifacts"
        # being skipped — Linux .AppImage/.deb/.pacman didn't reach
        # the release at all.
        if: matrix.target_label == 'linux' && startsWith(github.ref, 'refs/tags/ev') && env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/ev}"
          echo "[sentry] uploading source maps for decibell@${VERSION}"
          # Paths are relative to the job's default working-directory
          # (electron-client/), NOT the repo root. Prefixing with
          # electron-client/ here is what made 0.6.6's upload fail.
          # Explicitly create the release first — sentry-cli's
          # `sourcemaps upload --release X` auto-creates X in recent
          # versions, but `releases new` is idempotent and works
          # across older CLI versions / restricted auth scopes too.
          npx @sentry/cli releases new "decibell@${VERSION}" || true
          npx @sentry/cli sourcemaps inject \
            --release "decibell@${VERSION}" \
            dist/renderer
          npx @sentry/cli sourcemaps upload \
            --release "decibell@${VERSION}" \
            dist/renderer
          npx @sentry/cli releases finalize "decibell@${VERSION}" || true

      - name: Upload artifacts
        # Run even if the source-map step failed — binaries must
        # always reach the GitHub release.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decibell-${{ matrix.target_label }}
          path: |
            electron-client/release/*.AppImage
            electron-client/release/*.deb
            electron-client/release/*.pacman
            electron-client/release/*.exe
            electron-client/release/*.dmg
            electron-client/release/latest*.yml
            electron-client/release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Decibell ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*
