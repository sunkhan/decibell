syntax = "proto3";
package chatproj;

// --- Video codec negotiation ---
// Wire-compatible with the legacy single-codec setup: CODEC_H264_HW = 1
// preserves the value the existing Tauri client has been stamping in
// UdpVideoPacket.codec since launch. CODEC_UNKNOWN = 0 reclaims the
// retired CODEC_VP9 slot — server has always been codec-agnostic on
// the relay path so the change has no on-wire impact.
enum VideoCodec {
  CODEC_UNKNOWN = 0;
  CODEC_H264_HW = 1;
  CODEC_H264_SW = 2;
  CODEC_H265 = 3;
  CODEC_AV1 = 4;
}

message CodecCapability {
  VideoCodec codec = 1;
  uint32 max_width = 2;
  uint32 max_height = 3;
  uint32 max_fps = 4;
}

message ClientCapabilities {
  repeated CodecCapability encode = 1;
  repeated CodecCapability decode = 2;
}

message Packet {
  enum Type {
    UNKNOWN = 0;
    HANDSHAKE = 1;
    REGISTER_REQ = 2;
    REGISTER_RES = 3;
    LOGIN_REQ = 4;
    LOGIN_RES = 5;
    DIRECT_MSG = 6;
    PRESENCE_UPDATE = 7;
    SERVER_LIST_REQ = 8;
    SERVER_LIST_RES = 9;

    // Community Server Specific Types
    COMMUNITY_AUTH_REQ = 10;
    COMMUNITY_AUTH_RES = 11;
    CHANNEL_MSG = 12;
    reserved 13, 14;
    reserved "JOIN_CHANNEL_REQ", "JOIN_CHANNEL_RES";

    // Friend System Types
    FRIEND_ACTION_REQ = 15;
    FRIEND_ACTION_RES = 16;
    FRIEND_LIST_REQ = 17;
    FRIEND_LIST_RES = 18;

    JOIN_VOICE_REQ = 19;
    LEAVE_VOICE_REQ = 20;
    VOICE_PRESENCE_UPDATE = 21;
    VOICE_STATE_NOTIFY = 27;
    DM_PRIVACY = 28;

    // Screen Sharing Signaling
    STREAM_PRESENCE_UPDATE = 22;
    START_STREAM_REQ = 23;
    STOP_STREAM_REQ = 24;
    WATCH_STREAM_REQ = 25;
    STOP_WATCHING_REQ = 26;
    STREAM_THUMBNAIL_UPDATE = 29;
    SERVER_HEARTBEAT = 30;
    CLIENT_PING = 31;       // Client→central keepalive (no payload needed)

    // Membership + invites (community server)
    INVITE_CREATE_REQ = 32;
    INVITE_CREATE_RES = 33;
    INVITE_LIST_REQ = 34;
    INVITE_LIST_RES = 35;
    INVITE_REVOKE_REQ = 36;
    INVITE_REVOKE_RES = 37;
    MEMBER_LIST_REQ = 38;
    MEMBER_LIST_RES = 39;
    KICK_MEMBER_REQ = 40;
    BAN_MEMBER_REQ = 41;
    MOD_ACTION_RES = 42;    // shared kick/ban/leave response
    LEAVE_SERVER_REQ = 43;
    SERVER_META_UPDATE = 44; // server pushes owner/name/etc to client after auth
    MEMBERSHIP_REVOKED = 45; // server→client: you were kicked/banned

    // Central-hosted invite lookup (so clients can redeem a raw code
    // without knowing the hosting community server's host:port).
    INVITE_REGISTER_REQ = 46;    // community→central (shared secret)
    INVITE_UNREGISTER_REQ = 47;  // community→central (shared secret)
    INVITE_RESOLVE_REQ = 48;     // client→central (JWT)
    INVITE_RESOLVE_RES = 49;     // central→client

    // Persistent channel messages + per-channel retention.
    CHANNEL_HISTORY_REQ = 50;    // client→community
    CHANNEL_HISTORY_RES = 51;    // community→client
    CHANNEL_UPDATE_REQ = 52;     // client→community (owner-only)
    CHANNEL_UPDATE_RES = 53;     // community→client
    CHANNEL_PRUNED = 54;         // community→client: retention sweep happened
    CHANNEL_WIPE_REQ = 55;       // client→community (owner-only): nuke all messages in a channel
    CHANNEL_WIPE_RES = 56;       // community→requester: result of the wipe
    CHANNEL_WIPED = 57;          // community→all members: channel was wiped, drop local message state

    // Video codec negotiation.
    STREAM_CODEC_CHANGED_NOTIFY = 58;  // streamer→server→all in channel
    UPDATE_CAPABILITIES_REQ = 59;      // client→community when caps refreshed mid-session
  }

  Type type = 1;
  int64 timestamp = 2;
  string auth_token = 16;

  // Retired oneof field numbers — do not reuse. JOIN_CHANNEL_REQ/RES
  // were removed when text channels became a per-session subscription
  // implicit in COMMUNITY_AUTH_REQ rather than an explicit join.
  reserved 15, 17;
  reserved "join_channel_req", "join_channel_res";

  oneof payload {
    Handshake handshake = 3;
    RegisterRequest register_req = 4;
    RegisterResponse register_res = 5;
    LoginRequest login_req = 6;
    LoginResponse login_res = 7;
    DirectMessage direct_msg = 8;
    PresenceUpdate presence_update = 9;
    ServerListRequest server_list_req = 10;
    ServerListResponse server_list_res = 11;

    CommunityAuthRequest community_auth_req = 12;
    CommunityAuthResponse community_auth_res = 13;
    ChannelMessage channel_msg = 14;

    FriendActionReq friend_action_req = 18;
    FriendActionRes friend_action_res = 19;
    FriendListReq friend_list_req = 20;
    FriendListRes friend_list_res = 21;

    JoinVoiceRequest join_voice_req = 22;
    LeaveVoiceRequest leave_voice_req = 23;
    VoicePresenceUpdate voice_presence_update = 24;
    VoiceStateNotify voice_state_notify = 30;

    StreamPresenceUpdate stream_presence_update = 25;
    StartStreamRequest start_stream_req = 26;
    StopStreamRequest stop_stream_req = 27;
    WatchStreamRequest watch_stream_req = 28;
    StopWatchingRequest stop_watching_req = 29;
    DmPrivacySetting dm_privacy = 31;
    StreamThumbnailUpdate stream_thumbnail_update = 32;
    ServerHeartbeat server_heartbeat = 33;

    InviteCreateRequest invite_create_req = 34;
    InviteCreateResponse invite_create_res = 35;
    InviteListRequest invite_list_req = 36;
    InviteListResponse invite_list_res = 37;
    InviteRevokeRequest invite_revoke_req = 38;
    InviteRevokeResponse invite_revoke_res = 39;
    MemberListRequest member_list_req = 40;
    MemberListResponse member_list_res = 41;
    KickMemberRequest kick_member_req = 42;
    BanMemberRequest ban_member_req = 43;
    ModActionResponse mod_action_res = 44;
    LeaveServerRequest leave_server_req = 45;
    ServerMetaUpdate server_meta_update = 46;
    MembershipRevoked membership_revoked = 47;

    InviteRegisterRequest invite_register_req = 48;
    InviteUnregisterRequest invite_unregister_req = 49;
    InviteResolveRequest invite_resolve_req = 50;
    InviteResolveResponse invite_resolve_res = 51;

    ChannelHistoryRequest channel_history_req = 52;
    ChannelHistoryResponse channel_history_res = 53;
    ChannelUpdateRequest channel_update_req = 54;
    ChannelUpdateResponse channel_update_res = 55;
    ChannelPruned channel_pruned = 56;
    ChannelWipeRequest channel_wipe_req = 57;
    ChannelWipeResponse channel_wipe_res = 58;
    ChannelWiped channel_wiped = 59;

    StreamCodecChangedNotify stream_codec_changed_notify = 60;
    UpdateCapabilitiesRequest update_capabilities_req = 61;
  }
}

message Handshake {
  int32 protocol_version = 1;
  string client_id = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3; 
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string jwt_token = 3; 
}

message DirectMessage {
  string sender = 1;
  string recipient = 2;
  string content = 3;
  int64 timestamp = 4;
}

message PresenceUpdate {
  repeated string online_users = 1;
}

message ServerListRequest {
}

message CommunityServerInfo {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string host_ip = 4;
  int32 port = 5;
  int32 member_count = 6;
}

message ServerListResponse {
  repeated CommunityServerInfo servers = 1;
}

// --- Friend System Messages ---

enum FriendActionType {
  ADD = 0;
  REMOVE = 1;
  BLOCK = 2;
  ACCEPT = 3;
  REJECT = 4;
}

message FriendActionReq {
  FriendActionType action = 1;
  string target_username = 2;
}

message FriendActionRes {
  bool success = 1;
  string message = 2;
}

message FriendInfo {
  string username = 1;
  enum Status {
    ONLINE = 0;
    OFFLINE = 1;
    PENDING_INCOMING = 2;
    PENDING_OUTGOING = 3;
    BLOCKED = 4;
  }
  Status status = 2;
}

message FriendListReq {
}

message FriendListRes {
  repeated FriendInfo friends = 1;
}

// --- Community Server Messages ---

message ChannelInfo {
  string id = 1;
  string name = 2;
  enum Type { TEXT = 0; VOICE = 1; }
  Type type = 3;
  // Opus bitrate (kbps) for voice channels. 0 / unset means "use client default".
  int32 voice_bitrate_kbps = 4;
  // Per-channel retention in days. 0 = keep forever.
  // Text retention governs the message row itself; attachment retentions
  // soft-delete the attachment blob while leaving a tombstone row so the
  // client can render "file X was cleaned up after N days".
  int32 retention_days_text = 5;
  int32 retention_days_image = 6;
  int32 retention_days_video = 7;
  int32 retention_days_document = 8;
  int32 retention_days_audio = 9;
}

message CommunityAuthRequest {
  string jwt_token = 1;
  // Optional — when present, the user joins the server (consuming the invite)
  // as part of the same authentication handshake. Required for non-members.
  string invite_code = 2;
}

message CommunityAuthResponse {
  bool success = 1;
  string message = 2;
  repeated ChannelInfo channels = 3;
  // Membership failure reason code:
  //   ""               -> success
  //   "not_member"     -> user is not a member and did not supply an invite
  //   "invalid_invite" -> supplied invite is unknown, expired, or used up
  //   "banned"         -> user is banned from this server
  //   "auth"           -> JWT invalid
  string error_code = 4;
  // Server metadata (populated on success)
  string server_name = 5;
  string server_description = 6;
  string owner_username = 7;
  // Maximum attachment size (bytes) this server accepts per upload.
  // 0 means unlimited. Clients use this to pre-validate before sending the
  // init request; server enforces authoritatively.
  int64 max_attachment_bytes = 8;
  // Port for the HTTP attachment endpoint (upload/download). Typically
  // community server TCP port + 3. 0 means "feature not available".
  int32 attachment_port = 9;
}

message ChannelMessage {
  string sender = 1;
  string channel_id = 2;
  string content = 3;
  int64 timestamp = 4;
  // Server-assigned monotonic id (used as pagination cursor and dedupe key).
  // Zero when a client is sending; server populates before broadcast + persist.
  int64 id = 5;
  // Attachments associated with this message. Ordered by position ASC.
  repeated Attachment attachments = 6;
  // Client-generated UUID for optimistic-bubble dedup. Server echoes
  // this back unchanged in the broadcast — never persisted, just round-
  // tripped within the broadcast that fires within milliseconds of
  // CHANNEL_MSG arrival. Empty for messages re-fetched from history
  // (the originating client is long gone, no optimistic to dedup).
  string nonce = 7;
}

message Attachment {
  // Attachment kind — aligns with retention_days_{image,video,document,audio}.
  enum Kind {
    IMAGE = 0;
    VIDEO = 1;
    DOCUMENT = 2;
    AUDIO = 3;
  }
  int64 id = 1;
  int64 message_id = 2;
  Kind kind = 3;
  string filename = 4;
  string mime = 5;
  int64 size_bytes = 6;
  // Relative URL or storage identifier; empty when the attachment has been
  // purged by retention (tombstone row preserved for client rendering).
  string url = 7;
  int32 position = 8;
  int64 created_at = 9;
  // 0 = still present. Nonzero = unix seconds when retention removed the blob.
  int64 purged_at = 10;
  // Intrinsic pixel dimensions for image/video attachments. 0 = unknown
  // (older row or non-image kind). Clients use these to reserve the right
  // amount of space on first render so the data URL loading in later
  // doesn't cause a layout shift.
  uint32 width = 11;
  uint32 height = 12;
  // Total bytes across all server-stored JPEG thumbnails for this
  // attachment. 0 = no thumbnails (audio/document, or pre-thumbnail
  // upload). Clients use the presence (>0) to know whether to lazy-
  // fetch via GET /attachments/:id?variant=thumb[&size=N].
  uint32 thumbnail_size_bytes = 13;
  // Bitmask of pre-generated thumbnail sizes that exist on the server.
  // bit 0 = 320 px long-edge, bit 1 = 640 px, bit 2 = 1280 px. 0 with
  // thumbnail_size_bytes > 0 means a legacy single-size upload (320 px,
  // served from .thumb.jpg without the new naming).
  uint32 thumbnail_sizes_mask = 14;
  // Duration in milliseconds for audio + video attachments. Read at
  // upload time client-side and shipped in /attachments/init so chat
  // UIs can show "0:00 / 3:45" before the file is downloaded. 0 =
  // unknown (legacy row, non-media kind, or extraction failed).
  uint32 duration_ms = 15;
}

message ChannelHistoryRequest {
  string channel_id = 1;
  // Return messages with id < before_id. 0 means "most recent".
  int64 before_id = 2;
  // Server-enforced cap (hard max regardless of client value).
  int32 limit = 3;
}

message ChannelHistoryResponse {
  string channel_id = 1;
  // Ordered from oldest to newest within the page.
  repeated ChannelMessage messages = 2;
  // True when more messages exist older than the oldest one returned.
  bool has_more = 3;
}

message ChannelUpdateRequest {
  string channel_id = 1;
  // All five retention values — client sends the full snapshot. 0 = forever.
  int32 retention_days_text = 2;
  int32 retention_days_image = 3;
  int32 retention_days_video = 4;
  int32 retention_days_document = 5;
  int32 retention_days_audio = 6;
}

message ChannelUpdateResponse {
  bool success = 1;
  string message = 2;
  // Echo of the updated channel so clients can refresh their local copy.
  ChannelInfo channel = 3;
}

message AttachmentTombstone {
  int64 attachment_id = 1;
  int64 purged_at = 2;
}

message ChannelPruned {
  string channel_id = 1;
  // Message rows fully removed by text retention.
  repeated int64 deleted_message_ids = 2;
  // Attachments soft-deleted into tombstones (blob gone, metadata retained).
  repeated AttachmentTombstone purged_attachments = 3;
}

// Owner-initiated full wipe of a channel's history. Sent by the
// requesting client; the server validates ownership before acting.
message ChannelWipeRequest {
  string channel_id = 1;
}

// Reply to the requesting client only. Counts let the UI show
// confirmation feedback without re-fetching history.
message ChannelWipeResponse {
  bool success = 1;
  string message = 2;
  string channel_id = 3;
  int64 deleted_message_count = 4;
  int64 deleted_attachment_count = 5;
}

// Broadcast to every authenticated session after a successful wipe.
// Lets clients drop the channel's locally-cached message state without
// shipping every deleted message id over the wire.
message ChannelWiped {
  string channel_id = 1;
  // Wall-clock unix seconds when the wipe completed.
  int64 wiped_at = 2;
  string wiped_by = 3;
}

message JoinVoiceRequest {
  string channel_id = 1;
  // Capabilities of the joining client. Empty when sent by an older
  // client that pre-dates negotiation; server treats that as "H.264
  // decode/encode only, conservative ceilings" for back-compat.
  ClientCapabilities capabilities = 2;
}

message LeaveVoiceRequest {
}

message VoiceUserState {
  string username = 1;
  bool is_muted = 2;
  bool is_deafened = 3;
}

message VoicePresenceUpdate {
  string channel_id = 1;
  repeated string active_users = 2;
  repeated VoiceUserState user_states = 3;
  // Parallel to user_states/active_users — same length, same order.
  // user_capabilities[i] belongs to active_users[i].
  repeated ClientCapabilities user_capabilities = 4;
}

message VoiceStateNotify {
  bool is_muted = 1;
  bool is_deafened = 2;
}

message VideoStreamInfo {
  string stream_id = 1;
  string owner_username = 2;
  bool has_audio = 3;
  uint32 resolution_width = 4;
  uint32 resolution_height = 5;
  uint32 fps = 6;
  // Live current codec. Changes mid-stream when the streamer renegotiates.
  VideoCodec current_codec = 7;
  // CODEC_UNKNOWN if the streamer chose Auto. Drives the lock badge
  // and the grayed-out watch button.
  VideoCodec enforced_codec = 8;
}

message StreamPresenceUpdate {
  string channel_id = 1;
  repeated VideoStreamInfo active_streams = 2;
}

message StartStreamRequest {
  string channel_id = 1;
  int32 target_fps = 2;
  int32 target_bitrate_kbps = 3;
  bool has_audio = 4;
  uint32 resolution_width = 5;
  uint32 resolution_height = 6;
  // Codec the streamer is starting with. Auto-picked from the streamer's
  // encode caps (filtered by user toggles) when enforced_codec is UNKNOWN.
  VideoCodec chosen_codec = 7;
  // CODEC_UNKNOWN = no enforcement, auto-negotiation enabled.
  // Anything else = streamer locks the stream to this codec; viewers
  // without it see a grayed-out watch button (computed locally).
  VideoCodec enforced_codec = 8;
}

message StopStreamRequest {
  string channel_id = 1;
}

message WatchStreamRequest {
  string channel_id = 1;
  string target_username = 2;
}

message StopWatchingRequest {
  string channel_id = 1;
  string target_username = 2;
}

message StreamThumbnailUpdate {
  string channel_id = 1;
  string owner_username = 2;
  bytes thumbnail_data = 3;
}

message DmPrivacySetting {
  bool friends_only = 1;
}

message ServerHeartbeat {
  string name = 1;
  string description = 2;
  string host_ip = 3;
  int32 port = 4;
  int32 member_count = 5;
}

// --- Invites + Membership ---

message InviteInfo {
  string code = 1;
  string created_by = 2;
  int64 created_at = 3;
  int64 expires_at = 4;     // 0 = never
  int32 max_uses = 5;       // 0 = unlimited
  int32 uses = 6;
}

message InviteCreateRequest {
  // 0 means "never"
  int64 expires_at = 1;
  // 0 means "unlimited"
  int32 max_uses = 2;
}

message InviteCreateResponse {
  bool success = 1;
  string message = 2;
  InviteInfo invite = 3;
}

message InviteListRequest {}

message InviteListResponse {
  bool success = 1;
  string message = 2;
  repeated InviteInfo invites = 3;
}

message InviteRevokeRequest {
  string code = 1;
}

message InviteRevokeResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
}

message MemberInfo {
  string username = 1;
  int64 joined_at = 2;
  string nickname = 3;
  bool is_owner = 4;
  bool is_online = 5;
}

message MemberListRequest {}

message MemberListResponse {
  bool success = 1;
  string message = 2;
  repeated MemberInfo members = 3;
  repeated string bans = 4;
}

message KickMemberRequest {
  string username = 1;
  string reason = 2;
}

message BanMemberRequest {
  string username = 1;
  string reason = 2;
}

message ModActionResponse {
  bool success = 1;
  string message = 2;
  // Echo of the username that was acted upon, so the client can resolve
  // which request this response corresponds to.
  string username = 3;
  // "kick" | "ban" | "leave"
  string action = 4;
}

message LeaveServerRequest {}

message ServerMetaUpdate {
  string server_name = 1;
  string server_description = 2;
  string owner_username = 3;
}

message MembershipRevoked {
  // "kick" | "ban"
  string action = 1;
  string reason = 2;
  string actor = 3;
}

// --- Central-hosted invite lookup ---
// Community servers register each live invite with the central server so
// clients can redeem a raw code without knowing the community host:port.

message InviteRegisterRequest {
  string code = 1;
  string host = 2;
  uint32 port = 3;
  int64 expires_at = 4;  // 0 = never
}

message InviteUnregisterRequest {
  string code = 1;
}

message InviteResolveRequest {
  string code = 1;
}

message InviteResolveResponse {
  bool success = 1;
  string message = 2;
  string host = 3;
  uint32 port = 4;
  // Echoed so the client can correlate concurrent lookups.
  string code = 5;
}

// --- Video codec negotiation messages ---

// Sent by the streamer when it switches codec/resolution/fps mid-stream.
// Server validates the sender owns the stream, updates the registry
// entry, and rebroadcasts StreamPresenceUpdate to the channel.
message StreamCodecChangedNotify {
  string channel_id = 1;
  string streamer_username = 2;
  VideoCodec new_codec = 3;
  uint32 new_width = 4;
  uint32 new_height = 5;
  uint32 new_fps = 6;
  enum Reason {
    REASON_UNKNOWN = 0;
    WATCHER_JOINED_LOW_CAPS = 1;
    LIMITING_WATCHER_LEFT = 2;
    STREAMER_INITIATED = 3;
  }
  Reason reason = 7;
}

// Sent by a client mid-session when the user clicks "Refresh codec
// capabilities" in Settings. Server stores the new caps on the session
// and rebroadcasts VoicePresenceUpdate so peers see the change without
// the user having to leave and rejoin the voice channel.
message UpdateCapabilitiesRequest {
  ClientCapabilities capabilities = 1;
}